version: "3.8"

services:
  node1:
    build: .
    container_name: credify-node1
    ports:
      - "5001:5000"
    environment:
      - NODE_NAME=node1
      - PORT=5000
      - HOST=0.0.0.0
      - DATABASE_URL=sqlite:///data/node1.db
      - SESSION_SECRET=node1-secret-key
      - PEER_NODES=http://node2:5000,http://node3:5000
    volumes:
      - node1_data:/app/data
    networks:
      - blockchain-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/" ]
      interval: 30s
      timeout: 10s
      retries: 3

  node2:
    build: .
    container_name: credify-node2
    ports:
      - "5002:5000"
    environment:
      - NODE_NAME=node2
      - PORT=5000
      - HOST=0.0.0.0
      - DATABASE_URL=sqlite:///data/node2.db
      - SESSION_SECRET=node2-secret-key
      - PEER_NODES=http://node1:5000,http://node3:5000
    volumes:
      - node2_data:/app/data
    networks:
      - blockchain-net
    restart: unless-stopped

  node3:
    build: .
    container_name: credify-node3
    ports:
      - "5003:5000"
    environment:
      - NODE_NAME=node3
      - PORT=5000
      - HOST=0.0.0.0
      - DATABASE_URL=sqlite:///data/node3.db
      - SESSION_SECRET=node3-secret-key
      - PEER_NODES=http://node1:5000,http://node2:5000
    volumes:
      - node3_data:/app/data
    networks:
      - blockchain-net
    restart: unless-stopped

networks:
  blockchain-net:
    driver: bridge

volumes:
  node1_data:
  node2_data:
  node3_data:
