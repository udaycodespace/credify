<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Credify Verify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <h1>Credify Verify</h1>
      <p>Independent Credential Verifier</p>
      <small>Open from a certificate QR, scan live, or upload a QR image</small>
    </header>

    <section class="panel">
      <h2>Scan Credential QR</h2>
      <div class="row">
        <button id="startScanBtn">Start Camera Scan</button>
        <button id="stopScanBtn" disabled>Stop Scan</button>
      </div>
      <video id="camera" autoplay playsinline muted></video>
      <canvas id="scanCanvas" hidden></canvas>
    </section>

    <section class="panel">
      <h2>Upload QR Image</h2>
      <input id="qrFile" type="file" accept="image/*" />
      <canvas id="uploadCanvas" hidden></canvas>
    </section>

    <section class="panel">
      <h2>QR Link Verification</h2>
      <div class="row">
        <input id="qrLinkInput" type="text" placeholder="Paste a verification URL if you are not scanning directly">
        <button id="verifyLinkBtn" type="button">Verify Link</button>
      </div>
    </section>

    <section class="panel" id="resultPanel">
      <h2>Result</h2>
      <div id="statusBadge" class="badge pending">PENDING</div>
      <div id="resultCard">Waiting for scan...</div>
    </section>
  </main>

  <script src="https://unpkg.com/@zxing/library@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
