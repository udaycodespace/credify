<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Alert: Identity Rejection | Credify</title>
    <!-- Use Outfit font for a premium feel -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #ef4444;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .rejection-card {
            background: white;
            max-width: 500px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .card-header {
            background-color: var(--accent);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .card-header i {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .card-header h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
        }

        .card-body {
            padding: 40px;
        }

        .instruction {
            color: #475569;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary);
            font-size: 14px;
        }

        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
        }

        .btn-submit {
            width: 100%;
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2);
        }

        .btn-submit:hover {
            background-color: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.3);
        }

        .footer {
            text-align: center;
            padding-bottom: 30px;
            color: #94a3b8;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div class="rejection-card">
        <div class="card-header">
            <i class="fas fa-shield-virus"></i>
            <h2>Security Conflict Detected</h2>
        </div>
        <div class="card-body">
            <p class="instruction">
                We have halted the onboarding process for <strong>{{ full_name }}</strong>. Please provide a reason for
                this rejection to help us secure your identity.
            </p>

            <form action="/api/activate/reject" method="POST">
                <input type="hidden" name="token" value="{{ token }}">

                <div class="form-group">
                    <label>Reason for Rejection</label>
                    <select name="category" required>
                        <option value="identity_fraud">I did not initiate this request</option>
                        <option value="data_error">Incorrect student information</option>
                        <option value="other">Other security reason</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Additional Details (Optional)</label>
                    <textarea name="details" rows="4" placeholder="Please describe the issue in detail..."></textarea>
                </div>

                <button type="submit" class="btn-submit">CONFIRM SECURITY LOCK</button>
            </form>
        </div>
        <div class="footer">
            Credify Security Protocol • GPREC Institutional Grade
        </div>
    </div>
</body>

</html>
